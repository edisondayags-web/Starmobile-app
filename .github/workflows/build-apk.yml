name: Build Android APK
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip *.zip

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm install
        working-directory: nervous-green-cookies

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: Prebuild native Android project
        run: cd nervous-green-cookies && npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x nervous-green-cookies/android/gradlew

      - name: Build release APK with Gradle
        run: cd nervous-green-cookies/android && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: build.apk
          path: nervous-green-cookies/android/app/build/outputs/apk/release/*.apk
