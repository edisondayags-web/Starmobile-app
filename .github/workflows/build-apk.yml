name: Build Android APK
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List repo files (debug)
        run: ls -la

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Expo project structure
        run: npx create-expo-app@latest ur-scanner --template blank --no-install

      - name: Copy App.js into project
        run: cp "App.js" "ur-scanner/App.js"

      - name: Copy logo image into project
        run: cp "ChatGPT Image Jun 29, 2026, 08_23_07 AM.png" "ur-scanner/ChatGPT Image Jun 29, 2026, 08_23_07 AM.png"

      - name: Copy app.json into project (if present)
        run: |
          if [ -f "app.json" ]; then
            cp "app.json" "ur-scanner/app.json"
            echo "app.json copied."
          else
            echo "No custom app.json found, using default from create-expo-app."
          fi

      - run: npm install
        working-directory: ur-scanner

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: Install required dependencies
        run: |
          cd ur-scanner
          npx expo install expo-camera expo-av @react-native-async-storage/async-storage react-native-reanimated firebase

      - name: Verify final project structure (debug)
        run: |
          ls -la ur-scanner
          echo "--- app.json contents ---"
          cat ur-scanner/app.json

      - name: Prebuild native Android project
        run: cd ur-scanner && npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x ur-scanner/android/gradlew

      - name: Build release APK with Gradle
        run: cd ur-scanner/android && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: build.apk
          path: ur-scanner/android/app/build/outputs/apk/release/*.apk
